name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-binaries:
    name: Build standalone binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: nextcool-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: nextcool-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: nextcool-linux-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            artifact: nextcool-linux-arm64
          - os: windows-latest
            target: bun-windows-x64
            artifact: nextcool-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Build binary
        run: |
          bun build dist/cli.js \
            --compile \
            --target=${{ matrix.target }} \
            --outfile=${{ matrix.artifact }}
        shell: bash

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
